name: CI

on:
  push:
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - uses: foundry-rs/foundry-toolchain@v1

      - run: npm ci

      - run: npm --prefix app ci

      - run: npm run verify
